<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stock Ledger | Dr. Neeti Kaushik</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(226, 232, 240, 1);
        }

        .tab-active {
            border-bottom: 2px solid #6366f1;
            color: #6366f1;
        }

        input:focus,
        select:focus {
            outline: none;
            border-color: #6366f1;
            ring: 2px #6366f122;
        }
    </style>
</head>

<body class="p-4 md:p-8">
    <div class="max-w-6xl mx-auto">
        <!-- Header -->
        <header class="mb-8 flex flex-col md:flex-row md:items-center justify-between gap-4">
            <div>
                <h1 class="text-2xl font-bold text-slate-800">Inventory Ledger</h1>
                <p class="text-slate-500">Dr. Neeti Kaushik Management System</p>
            </div>
            <div class="flex gap-2">
                <button onclick="exportToCSV()"
                    class="px-4 py-2 bg-white border border-slate-200 rounded-lg text-slate-600 hover:bg-slate-50 transition flex items-center gap-2">
                    <i class="fa-solid fa-file-export text-xs"></i> Export CSV
                </button>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <!-- Form Section -->
            <div class="lg:col-span-1">
                <div class="glass-panel p-6 rounded-2xl shadow-sm sticky top-8">
                    <h2 class="text-lg font-semibold mb-4 text-slate-700 flex items-center gap-2">
                        <i class="fa-solid fa-plus-circle text-indigo-500"></i> New Entry
                    </h2>

                    <form id="stockForm" class="space-y-4">
                        <div>
                            <label class="block text-xs font-medium text-slate-500 uppercase mb-1">Category</label>
                            <select id="category" required onchange="handleCategoryChange()"
                                class="w-full p-2.5 bg-slate-50 border border-slate-200 rounded-lg text-sm">
                                <option value="">Select Category</option>
                                <option value="RUDRAKSHA">Rudraksha</option>
                                <option value="TREE">Tree</option>
                                <option value="RING">Ring</option>
                                <option value="PENDANT">Pendant</option>
                                <option value="BALL">Ball</option>
                                <option value="BRACELET">Bracelet</option>
                                <option value="STATIONARY">Stationary</option>
                                <option value="SOAP/MIST">Soap/Mist</option>
                                <option value="TUMBLES">Tumbles</option>
                                <option value="ANGEL">Angel</option>
                                <option value="MALA">Mala</option>
                                <option value="SILVER">Silver</option>
                                <option value="OTHERS">Others</option>
                            </select>
                        </div>

                        <div>
                            <label class="block text-xs font-medium text-slate-500 uppercase mb-1">SKU Number</label>
                            <div class="relative">
                                <input type="text" id="sku" required placeholder="Select category first"
                                    class="w-full p-2.5 bg-slate-50 border border-slate-200 rounded-lg text-sm font-mono">
                                <button type="button" onclick="generateSKU()"
                                    class="absolute right-2 top-1.5 text-indigo-600 hover:text-indigo-800 text-xs font-bold px-2 py-1 bg-indigo-50 rounded">
                                    AUTO
                                </button>
                            </div>
                        </div>

                        <div>
                            <label class="block text-xs font-medium text-slate-500 uppercase mb-1">Item Name</label>
                            <input type="text" id="itemName" required placeholder="e.g. Rose Quartz Tree"
                                class="w-full p-2.5 bg-slate-50 border border-slate-200 rounded-lg text-sm">
                        </div>

                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="block text-xs font-medium text-slate-500 uppercase mb-1">Quantity</label>
                                <input type="number" id="qty" required min="1" value="1"
                                    class="w-full p-2.5 bg-slate-50 border border-slate-200 rounded-lg text-sm">
                            </div>
                            <div>
                                <label class="block text-xs font-medium text-slate-500 uppercase mb-1">Unit Cost</label>
                                <input type="number" id="price" required min="0" step="0.01" placeholder="0.00"
                                    class="w-full p-2.5 bg-slate-50 border border-slate-200 rounded-lg text-sm">
                            </div>
                        </div>

                        <button type="submit"
                            class="w-full py-3 bg-indigo-600 hover:bg-indigo-700 text-white font-semibold rounded-lg shadow-lg shadow-indigo-200 transition-all flex items-center justify-center gap-2">
                            <i class="fa-solid fa-save"></i> Save to Ledger
                        </button>
                    </form>
                </div>
            </div>

            <!-- List Section -->
            <div class="lg:col-span-2">
                <div class="glass-panel rounded-2xl shadow-sm overflow-hidden">
                    <div class="p-4 border-b border-slate-100 flex items-center justify-between bg-white">
                        <h3 class="font-bold text-slate-700">Stock Table</h3>
                        <div class="relative w-48">
                            <input type="text" id="search" onkeyup="filterTable()" placeholder="Search..."
                                class="w-full pl-8 pr-3 py-1.5 bg-slate-100 rounded-full text-xs border-none">
                            <i
                                class="fa-solid fa-magnifying-glass absolute left-3 top-2.5 text-slate-400 text-[10px]"></i>
                        </div>
                    </div>
                    <div class="overflow-x-auto">
                        <table class="w-full text-left text-sm" id="ledgerTable">
                            <thead>
                                <tr class="bg-slate-50 border-b border-slate-100">
                                    <th class="p-4 font-semibold text-slate-600">SKU</th>
                                    <th class="p-4 font-semibold text-slate-600">Item</th>
                                    <th class="p-4 font-semibold text-slate-600">Qty</th>
                                    <th class="p-4 font-semibold text-slate-600">Total</th>
                                    <th class="p-4 font-semibold text-slate-600 text-right">Actions</th>
                                </tr>
                            </thead>
                            <tbody id="inventoryList" class="divide-y divide-slate-100 bg-white">
                                <!-- Data will be injected here -->
                            </tbody>
                        </table>
                    </div>
                    <div id="emptyState" class="p-12 text-center text-slate-400 hidden">
                        <i class="fa-solid fa-box-open text-4xl mb-3"></i>
                        <p>No inventory items found.</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Configuration for SKUs as provided
        const SKU_CONFIG = {
            "RUDRAKSHA": { prefix: "NKRU", start: 1120 },
            "TREE": { prefix: "NKT", start: 1521 },
            "RING": { prefix: "NKK", start: 1432 },
            "PENDANT": { prefix: "NKP", start: 1732 },
            "BALL": { prefix: "NKBA", start: 1615 },
            "BRACELET": { prefix: "NKB", start: 2096 }, // Adjusted based on your input NKB02095
            "STATIONARY": { prefix: "NKS", start: 4011 },
            "SOAP/MIST": { prefix: "NKS", start: 4056 },
            "TUMBLES": { prefix: "NKTB", start: 1836 },
            "ANGEL": { prefix: "NKA", start: 1327 },
            "MALA": { prefix: "NKM", start: 3119 },
            "SILVER": { prefix: "NKS", start: 9302 },
            "OTHERS": { prefix: "NKO", start: 1981 }
        };

        let inventory = JSON.parse(localStorage.getItem('nk_inventory')) || [];

        function handleCategoryChange() {
            const cat = document.getElementById('category').value;
            if (cat) generateSKU();
        }

        function generateSKU() {
            const cat = document.getElementById('category').value;
            if (!cat) return;

            const config = SKU_CONFIG[cat];

            // Find existing items in this category to increment correctly
            const filtered = inventory.filter(item => item.sku.startsWith(config.prefix));
            let nextNum = config.start;

            if (filtered.length > 0) {
                // Extract numbers and find max
                const nums = filtered.map(item => {
                    const matched = item.sku.match(/\d+/);
                    return matched ? parseInt(matched[0]) : 0;
                });
                nextNum = Math.max(...nums) + 1;
            }

            // Formatting: Bracelet and Stationary have specific padded styles (4-5 digits)
            let formattedNum = nextNum.toString();
            if (cat === "BRACELET") formattedNum = nextNum.toString().padStart(5, '0');
            else if (cat === "STATIONARY" || cat === "SOAP/MIST") formattedNum = nextNum.toString().padStart(5, '0');

            document.getElementById('sku').value = config.prefix + formattedNum;
        }

        const stockForm = document.getElementById('stockForm');
        stockForm.addEventListener('submit', (e) => {
            e.preventDefault();

            const item = {
                id: Date.now(),
                category: document.getElementById('category').value,
                sku: document.getElementById('sku').value,
                itemName: document.getElementById('itemName').value,
                qty: parseInt(document.getElementById('qty').value),
                price: parseFloat(document.getElementById('price').value),
                date: new Date().toLocaleDateString()
            };

            inventory.unshift(item);
            saveAndRender();
            stockForm.reset();
        });

        function deleteItem(id) {
            inventory = inventory.filter(item => item.id !== id);
            saveAndRender();
        }

        function saveAndRender() {
            localStorage.setItem('nk_inventory', JSON.stringify(inventory));
            renderTable();
        }

        function renderTable() {
            const list = document.getElementById('inventoryList');
            const emptyState = document.getElementById('emptyState');
            list.innerHTML = '';

            if (inventory.length === 0) {
                emptyState.classList.remove('hidden');
                return;
            } else {
                emptyState.classList.add('hidden');
            }

            inventory.forEach(item => {
                const row = document.createElement('tr');
                row.className = "hover:bg-slate-50 transition";
                row.innerHTML = `
                    <td class="p-4">
                        <span class="px-2 py-1 bg-slate-100 rounded text-xs font-mono font-semibold text-slate-600">${item.sku}</span>
                    </td>
                    <td class="p-4 font-medium text-slate-800">
                        ${item.itemName}
                        <div class="text-[10px] text-slate-400 font-normal">${item.category} • ${item.date}</div>
                    </td>
                    <td class="p-4 text-slate-600">${item.qty}</td>
                    <td class="p-4 font-semibold text-slate-700">₹${(item.qty * item.price).toLocaleString()}</td>
                    <td class="p-4 text-right">
                        <button onclick="deleteItem(${item.id})" class="text-slate-300 hover:text-red-500 transition px-2">
                            <i class="fa-solid fa-trash-can"></i>
                        </button>
                    </td>
                `;
                list.appendChild(row);
            });
        }

        function filterTable() {
            const query = document.getElementById('search').value.toLowerCase();
            const rows = document.querySelectorAll('#inventoryList tr');
            rows.forEach(row => {
                row.style.display = row.innerText.toLowerCase().includes(query) ? '' : 'none';
            });
        }

        function exportToCSV() {
            if (inventory.length === 0) return;
            const headers = ["Date", "Category", "SKU", "Item Name", "Qty", "Price", "Total"];
            const csvRows = [headers.join(',')];

            inventory.forEach(item => {
                csvRows.push([
                    item.date,
                    item.category,
                    item.sku,
                    `"${item.itemName}"`,
                    item.qty,
                    item.price,
                    item.qty * item.price
                ].join(','));
            });

            const blob = new Blob([csvRows.join('\n')], { type: 'text/csv' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.setAttribute('hidden', '');
            a.setAttribute('href', url);
            a.setAttribute('download', `inventory_report_${new Date().toISOString().split('T')[0]}.csv`);
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
        }

        // Init
        renderTable();
    </script>
</body>

</html>
